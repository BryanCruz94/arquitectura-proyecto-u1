<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Historial de Busquedas Artemisa</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="./css/styles.css" />
</head>

<body>
  <main class="app-container">
    <section class="hero text-center">
      <img src="assets/img/logo_artemisa.png" alt="logo artemisa" id="logo" />

      <p class="subtitle">
        Búsquedas recientes
      </p>

      <button id="backButton" class="btn btn-artemisa history-button" type="button">
        Regresar
      </button>
    </section>

    <section id="historyLoading" class="loading">
      Cargando historial desde la base de datos...
    </section>

    <section id="historySection" class="result-card d-none">
      <h3>Historial de busquedas</h3>
      <div id="historyContainer"></div>
    </section>

    <section id="historyEmptyState" class="empty-state d-none">
      No existen busquedas registradas.
    </section>
  </main>

  <script src="./js/history.js"></script>
</body>

</html>
