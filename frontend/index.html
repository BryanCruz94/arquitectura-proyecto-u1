<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sistema de Búsqueda Artemisa</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <link rel="stylesheet" href="./css/styles.css" />
</head>

<body>
  <main class="app-container">
    <section class="hero text-center" >

      
      <img src="assets/img/logo_artemisa.png" alt="logo artemisa" id="logo" />

      <!-- Cargar archivos -->
      <p class="subtitle">
        Cargue sus archivos para realizar búsquedas precisas y ampliadas con nuestro sistema de búsqueda Artemisa.
      </p>

      <section class="upload-box">
        <input id="fileInput" type="file" class="form-control" multiple accept=".txt,.pdf" />

        <div class="button-group m-2">
          <button id="uploadButton" class="btn btn-artemisa" type="button">
            Subir archivos
          </button>

          <button id="clearFilesButton" class="btn btn-artemisa btn-limpiar" type="button">
            Limpiar archivos
          </button>
        </div>


        <div id="uploadedFilesSection" class="mt-3 d-none">
          <h5>Archivos cargados para búsqueda:</h5>
          <ul id="uploadedFilesList"></ul>
        </div>
      </section>

      <form id="searchForm" class="search-box">
        <input id="searchInput" type="text" class="form-control" placeholder="Buscar en archivos TXT y PDF..."
          autocomplete="off" />
<!-- Botones de búsqueda -->
        <button id="btnPreciseSearch" class="btn btn-artemisa" type="submit" data-mode="AND">
          Búsqueda precisa
        </button>

        <button id="btnExpandedSearch" class="btn btn-artemisa" type="submit" data-mode="OR">
          Búsqueda ampliada
        </button>
      </form>
    </section>

    <section id="loading" class="loading d-none">
      Procesando consulta en el pipeline...
    </section>

    <section id="tokensSection" class="result-card d-none">
      <h3>Tokens generados</h3>
      <div id="tokensContainer" class="tokens-container"></div>
    </section>

    <section id="resultsSection" class="result-card d-none">
      <h3>Resultados encontrados</h3>
      <div id="resultsContainer"></div>
    </section>

    <!-- no se encontraron coincidencias -->
    <section id="emptyState" class="empty-state d-none">
      No se encontraron coincidencias.
    </section>
  </main>

  <script src="./js/app.js"></script>
</body>

</html>
